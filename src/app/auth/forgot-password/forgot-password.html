<div class="container-fluid d-flex justify-content-center align-items-center py-5 min-vh-100 px-3">
  <div class="card col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4 p-4 p-md-5 shadow-lg rounded-4 border-0">
    <h3 class="text-center fw-semibold mb-4">Forgot Password</h3>
    <p class="text-center text-secondary mb-4">Enter your email address and we'll send you a verification code to reset your password.</p>
    
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="sendCode()" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label text-dark fw-medium">
          Email Address <span class="text-danger">*</span>
        </label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-control"
          [class.is-invalid]="isFieldInvalid('email')"
          [class.is-valid]="forgotPasswordForm.get('email')?.valid && forgotPasswordForm.get('email')?.touched"
          placeholder="yourname@univen.ac.za"
          autocomplete="email">
        <div class="invalid-feedback" *ngIf="isFieldInvalid('email')">
          {{ getFieldError('email') }}
        </div>
        <small class="form-text text-muted">Must be a valid @univen.ac.za email address</small>
      </div>

      <button 
        type="submit" 
        class="btn btn-primary w-100 fw-bold mb-3 shadow-sm"
        [disabled]="forgotPasswordForm.invalid || isCodeSent">
        <span *ngIf="!isCodeSent">Send Verification Code</span>
        <span *ngIf="isCodeSent">Code Sent</span>
      </button>
    </form>

    <!-- Display verification code on screen (same style as sign-up page) -->
    <div *ngIf="verificationCode && isCodeSent" class="alert alert-info mb-2" style="background-color: #e7f3ff; border: 1px solid #b3d9ff;">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <small class="text-muted d-block mb-1">Your verification code:</small>
          <strong style="font-size: 18px; color: #26406e; letter-spacing: 2px;">{{ verificationCode }}</strong>
        </div>
        <button type="button" class="btn btn-sm btn-outline-primary" (click)="copyCode()">
          <i class="bi bi-clipboard me-1"></i>Copy
        </button>
      </div>
    </div>

    <!-- Show link to reset password page after code is sent -->
    <div *ngIf="isCodeSent" class="text-center mb-3">
      <a 
        [routerLink]="['/auth/reset-password']" 
        [queryParams]="{ email: forgotPasswordForm.get('email')?.value, code: verificationCode }"
        class="btn btn-outline-primary w-100 fw-semibold">
        <i class="bi bi-arrow-right me-2"></i>Proceed to Reset Password
      </a>
    </div>

    <hr class="my-3">

    <p class="text-center mb-0 text-secondary">
      Remember your password?
      <a routerLink="/login" class="fw-semibold text-decoration-none">Back to Login</a>
    </p>
  </div>
</div>
